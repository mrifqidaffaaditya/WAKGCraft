# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# TAMBAHAN: Memberikan izin agar GitHub Actions bot bisa membuat Release
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    # --- TAMBAHAN: Step untuk mempublikasikan Release otomatis ---
    - name: Create GitHub Release and Upload JAR
      uses: softprops/action-gh-release@v2
      # Hanya jalankan publish release jika event-nya adalah push ke branch main (bukan dari pull_request)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: "v1.0.${{ github.run_number }}" # Membuat tag otomatis berdasarkan nomor urut build Actions
        name: "Auto-Release Build #${{ github.run_number }}"
        files: target/*.jar # Mengambil semua file JAR dari hasil build Maven di folder target
        generate_release_notes: true # Otomatis membuat catatan rilis berdasarkan commit
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
